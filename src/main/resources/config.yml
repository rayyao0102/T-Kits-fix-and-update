# T-Kits Configuration v1.0
# A comprehensive kit management plugin by Takeda

#-----------------------------------------
# General Settings
#-----------------------------------------
debug: false # Enable verbose logging for debugging purposes

#-----------------------------------------
# Storage Configuration
#-----------------------------------------
storage:
  type: YAML # Available types: YAML, MYSQL
  
  # MySQL Database Settings (only used if type is set to MYSQL)
  mysql:
    host: "localhost"
    port: 3306
    database: "tkits"
    username: "user"
    password: "password"
    useSSL: false
    connection_options: "?autoReconnect=true&useUnicode=true&characterEncoding=utf8"
    
    # Connection Pool Configuration
    pool_settings:
      maximum_pool_size: 10
      minimum_idle: 5
      idle_timeout: 300000
      connection_timeout: 30000
      max_lifetime: 1800000

#-----------------------------------------
# Kit Management Settings
#-----------------------------------------
kits:
  max_kits_per_player: 7        # Maximum number of kits each player can save
  save_on_editor_close: true    # Automatically save kits when closing the editor
  clear_kit_requires_confirmation: true  # Ask for confirmation before clearing a kit
  
  # Inventory Handling
  clear_inventory_on_load: false  # Whether to clear player inventory before applying a kit
  load_requires_empty_inventory: false  # Prevent loading if inventory isn't empty
  
  # Restrictions
  prevent_load_in_worlds: []     # List of worlds where kit loading is disabled
                                 # Example: ["world_nether", "resource_world"]
  prevent_save_items: []         # List of Material names that cannot be saved in kits
                                 # Example: ["BEDROCK", "COMMAND_BLOCK"]
  max_total_items_in_kit: -1     # Limit total item count in a kit, -1 for unlimited

#-----------------------------------------
# Kit Sharing Settings
#-----------------------------------------
sharing:
  code_length: 5                   # Length of generated share codes
  code_one_time_use: true          # Whether share codes can only be used once
  code_expiration_minutes: 5       # How long share codes remain valid
  allow_sharing_global_kits: true  # Allow generating codes for global kits

#-----------------------------------------
# Combat Tag Settings
#-----------------------------------------
combat_tag:
  enabled: true
  duration_seconds: 10
  
  # Commands blocked during combat (lowercase)
  blocked_commands:
    - "k1"
    - "k2"
    - "k3"
    - "k4"
    - "k5"
    - "k6"
    - "k7"
    - "regear"
    - "rg"
    - "arrange"
    - "ag"
  
  prevent_enderpearl: false  # Prevent Ender Pearl use while tagged
  # external_plugin_hook: ""  # Optional: Specify external plugin name (e.g., "CombatLogX")

#-----------------------------------------
# Command Cooldowns (in seconds)
#-----------------------------------------
cooldowns:
  kit_load: 3    # Cooldown for /k1 - /k7 commands
  regear: 10     # Cooldown for regear command
  arrange: 5     # Cooldown for arrange command

#-----------------------------------------
# Regear & Arrange Settings
#-----------------------------------------
regear:
  box_material: SHULKER_BOX  # Material for the regear box
  box_name: "&aRegear Box for {player}"  # Name for the regear box item

arrange:
  # How /arrange handles items not in kit layout:
  # KEEP - Keep extra items in inventory
  # DROP - Drop items on the ground
  # MOVE_EMPTY - Move items to empty slots
  handle_extra_items: "KEEP"

#-----------------------------------------
# Kitroom Settings
#-----------------------------------------
kitroom:
  require_per_category_permission: false  # If true, requires tkits.kitroom.category.<categoryname>
  item_take_cooldown_seconds: 0           # Cooldown between taking items

#-----------------------------------------
# Sound Effects
#-----------------------------------------
sounds:
  # UI Sounds
  gui_click: "UI_BUTTON_CLICK"
  confirmation_open: "BLOCK_NOTE_BLOCK_BELL"
  confirmation_confirm: "ENTITY_ARROW_HIT_PLAYER"
  confirmation_cancel: "BLOCK_CHEST_CLOSE"
  cooldown: "BLOCK_NOTE_BLOCK_BASS"
  error: "BLOCK_NOTE_BLOCK_PLING"
  
  # Kit Operation Sounds
  kit_load: "ENTITY_PLAYER_LEVELUP"
  kit_save: "BLOCK_SMITHING_TABLE_USE"
  kit_share: "ENTITY_ITEM_FRAME_ADD_ITEM"
  repair_success: "BLOCK_ANVIL_USE"
  repair_fail: "BLOCK_ANVIL_DESTROY"

  # Import/Export Sounds
  kit_import_success: "ITEM_TRIDENT_RETURN"
  kit_import_fail: "BLOCK_CHAIN_BREAK"
  
  # Other Function Sounds
  regear_success: "ENTITY_ITEM_PICKUP"
  arrange_success: "BLOCK_PISTON_EXTEND"

#-----------------------------------------
